name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: ['8.3', '8.4', '8.5']
        laravel: [ 12.*, 13.* ]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 12.*
            testbench: ^10.0
            carbon: ^3.8.4
          - laravel: 13.*
            testbench: ^11.0
            carbon: ^3.8.4

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip
          tools: composer:v2
          coverage: pcov

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:${{ matrix.carbon }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --coverage --coverage-clover build/logs/clover.xml

      - name: Format coverage report
        if: matrix.php == '8.4' && matrix.laravel == '13.*' && matrix.stability == 'prefer-stable'
        run: |
          mkdir -p build
          echo "### Test Coverage" > build/coverage_summary.md
          echo "| Class | Coverage |" >> build/coverage_summary.md
          echo "| :--- | :---: |" >> build/coverage_summary.md

          # Extract class name and its percentage from the text report
          # Example line: "  NjoguAmos\Turnstile\Http\Controllers\TurnstileController . 100.0% "
          grep -E '^[[:space:]]*[A-Za-z0-9\\]+[[:space:]]+\.+' build/coverage.txt | while read -r line; do
            class=$(echo "$line" | awk '{print $1}')
            percent=$(echo "$line" | grep -oE '[0-9.]+%')
            echo "| $class | $percent |" >> build/coverage_summary.md
          done

          # Add a summary section
          echo "" >> build/coverage_summary.md
          echo "<details><summary>Full Coverage Report</summary>" >> build/coverage_summary.md
          echo "" >> build/coverage_summary.md
          echo "\`\`\`" >> build/coverage_summary.md
          cat build/coverage.txt >> build/coverage_summary.md
          echo "\`\`\`" >> build/coverage_summary.md
          echo "</details>" >> build/coverage_summary.md

          cat build/coverage_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Report Coverage
        if: matrix.php == '8.4' && matrix.laravel == '13.*' && matrix.stability == 'prefer-stable' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: build/coverage_summary.md
